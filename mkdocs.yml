site_name: lrc-automation
site_description: Lightroom Classic catalog automation tool
repo_url: https://github.com/fjacquet/lrc-automation

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Usage: usage.md
  - Architecture: architecture.md
  - PRD: prd.md
  - ADR:
      - "001 - Catalog Automation": adr/001-lightroom-classic-catalog-automation.md
