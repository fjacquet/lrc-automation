name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    # Builds wheel/sdist + SBOM, publishes a GitHub Release with those assets,
    # and pushes a Docker image to ghcr.io. No PyPI. See fjacquet/ci.
    uses: fjacquet/ci/.github/workflows/python-app-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
